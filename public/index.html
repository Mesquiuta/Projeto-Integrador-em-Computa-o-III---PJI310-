<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Projeto Integrador UNIVESP - Previsão de produção para redução de desperdícios em padaria" />
  <title>Padaria UNIVESP - Previsão de Produção</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A5%96%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">🥖</span>
        <div>
          <div class="brand-title">Padaria UNIVESP</div>
          <div class="brand-subtitle">Projeto Integrador</div>
        </div>
      </div>
      <nav class="nav">
        <a href="#/dashboard" data-route="dashboard"><span>📊</span> Dashboard</a>
        <a href="#/products"  data-route="products"><span>🥐</span> Produtos</a>
        <a href="#/sales"     data-route="sales"><span>💰</span> Vendas</a>
        <a href="#/production" data-route="production"><span>👨‍🍳</span> Produção</a>
        <a href="#/waste"     data-route="waste"><span>🗑️</span> Sobras / Perdas</a>
        <a href="#/recommendations" data-route="recommendations"><span>🎯</span> Sugestão de Produção</a>
      </nav>
      <div class="sidebar-footer">
        <button id="btn-seed" class="btn btn-secondary btn-block" title="Carrega 30 dias de dados fictícios para demonstração">
          Carregar dados de demonstração
        </button>
        <button id="btn-reset" class="btn btn-ghost btn-block" title="Limpa todos os dados do banco">
          Limpar dados
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1 id="page-title">Dashboard</h1>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>
      <section id="view" class="view"></section>
    </main>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <div id="modal-backdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <header class="modal-header">
        <h2 id="modal-title">Título</h2>
        <button class="modal-close" id="modal-close" aria-label="Fechar">×</button>
      </header>
      <div class="modal-body" id="modal-body"></div>
      <footer class="modal-footer" id="modal-footer"></footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
